server.port=8080
chatroom.launch.open-browser=true
chatroom.launch.host=127.0.0.1
chatroom.launch.path=/

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.jedis.pool.max-active=20
spring.data.redis.jedis.pool.max-idle=10
spring.data.redis.jedis.pool.min-idle=5

# session expiry: 30 minutes
chatroom.session.expire-minutes=30
# default room
chatroom.default-room-id=room_default
chatroom.default-room-name=公共聊天室
