<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redis Chatroom</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; }
button { cursor: pointer; border: none; border-radius: 6px; padding: 8px 18px; font-size: 14px; transition: 0.2s; }
input, textarea { border: 1px solid #3a3a5c; border-radius: 6px; padding: 10px 14px; font-size: 14px; background: #16213e; color: #eee; outline: none; transition: 0.2s; }
input:focus, textarea:focus { border-color: #e94560; }
input::placeholder { color: #666; }

/* Sidebar */
.sidebar { width: 260px; background: #16213e; display: flex; flex-direction: column; border-right: 1px solid #2a2a4a; }
.room-header { padding: 20px; border-bottom: 1px solid #2a2a4a; }
.room-header h2 { font-size: 18px; color: #e94560; margin-bottom: 4px; }
.room-header p { font-size: 12px; color: #888; }
.online-section { flex: 1; overflow-y: auto; padding: 12px; }
.online-section h3 { font-size: 13px; color: #aaa; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.online-user { padding: 8px 12px; border-radius: 6px; margin-bottom: 4px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
.online-user:hover { background: #1a1a3e; }
.online-user .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
.online-user .admin-badge { font-size: 10px; background: #e94560; color: #fff; padding: 2px 6px; border-radius: 4px; }
.user-panel { padding: 16px; border-top: 1px solid #2a2a4a; }
.user-panel .nickname { font-size: 15px; font-weight: 600; }
.user-panel .username { font-size: 12px; color: #888; }
.user-panel .actions { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
.user-panel .actions button { font-size: 12px; padding: 5px 10px; background: #2a2a4a; color: #ccc; }

/* Main chat */
.main { flex: 1; display: flex; flex-direction: column; }
.topbar { padding: 16px 24px; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; justify-content: space-between; }
.topbar h1 { font-size: 20px; }
.topbar .conn-status { font-size: 12px; padding: 4px 10px; border-radius: 12px; }
.topbar .connected { background: #4ade8022; color: #4ade80; }
.topbar .disconnected { background: #e9456022; color: #e94560; }
.messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 4px; }
.msg { display: flex; gap: 10px; padding: 6px 0; }
.msg.own { flex-direction: row-reverse; }
.msg .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
.msg .avatar.user-av { background: #3b82f6; color: #fff; }
.msg .avatar.admin-av { background: #e94560; color: #fff; }
.msg .bubble { max-width: 65%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
.msg:not(.own) .bubble { background: #2a2a4a; border-top-left-radius: 2px; }
.msg.own .bubble { background: #e94560; border-top-right-radius: 2px; }
.msg .meta { font-size: 11px; color: #888; margin-top: 2px; }
.msg.own .meta { text-align: right; }
.msg .sender { font-size: 12px; color: #aaa; margin-bottom: 2px; }
.msg.deleted .bubble { opacity: 0.4; font-style: italic; }
.input-area { padding: 16px 24px; border-top: 1px solid #2a2a4a; display: flex; gap: 12px; }
.input-area input { flex: 1; }
.input-area button { background: #e94560; color: #fff; font-weight: 600; padding: 10px 24px; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
.input-area button:hover:not(:disabled) { background: #d63850; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #1e1e3a; border-radius: 12px; padding: 32px; width: 400px; max-width: 90vw; }
.modal h2 { margin-bottom: 20px; font-size: 22px; color: #e94560; }
.modal .form-group { margin-bottom: 14px; }
.modal .form-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 4px; }
.modal .form-group input { width: 100%; }
.modal .btn-row { display: flex; gap: 10px; margin-top: 20px; }
.modal .btn-row button { flex: 1; }
.modal .btn-primary { background: #e94560; color: #fff; font-weight: 600; }
.modal .btn-ghost { background: transparent; color: #aaa; border: 1px solid #3a3a5c; }
.modal .btn-danger { background: #ef4444; color: #fff; font-weight: 600; }
.modal .switch-link { margin-top: 14px; text-align: center; font-size: 13px; color: #888; }
.modal .switch-link a { color: #e94560; cursor: pointer; text-decoration: none; }
.modal .switch-link a:hover { text-decoration: underline; }

/* Context menu */
.ctx-menu { position: fixed; background: #1e1e3a; border: 1px solid #3a3a5c; border-radius: 8px; padding: 4px 0; z-index: 200; min-width: 140px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.ctx-menu button { display: block; width: 100%; text-align: left; padding: 8px 16px; background: none; color: #eee; border-radius: 0; font-size: 13px; }
.ctx-menu button:hover { background: #2a2a4a; }
.ctx-menu .danger { color: #ef4444; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 3px; }

/* Toast */
.toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 300; animation: slideIn 0.3s ease; }
.toast.success { background: #4ade80; color: #1a1a2e; }
.toast.error { background: #ef4444; color: #fff; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="room-header">
    <h2 id="roomName">--</h2>
    <p id="roomStatus">请先登录并加入聊天室</p>
  </div>
  <div class="online-section">
    <h3>在线成员 (<span id="onlineCount">0</span>)</h3>
    <div id="onlineList"></div>
  </div>
  <div class="user-panel" id="userPanel" style="display:none">
    <div class="nickname" id="myNickname">--</div>
    <div class="username" id="myUsername">--</div>
    <div class="actions">
      <button onclick="showProfileModal()">修改资料</button>
      <button onclick="leaveRoom()">退出房间</button>
      <button onclick="logout()">退出登录</button>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <h1>💬 Redis Chatroom</h1>
    <div>
      <span class="conn-status" id="connStatus">未连接</span>
      <button onclick="showLoginModal()" id="btnLogin" style="margin-left:10px; background:#e94560; color:#fff;">登录</button>
      <button onclick="joinRoom()" id="btnJoin" style="margin-left:10px; background:#4ade80; color:#1a1a2e; display:none;">加入房间</button>
    </div>
  </div>
  <div class="messages" id="messages">
    <div style="text-align:center; color:#555; margin-top:40%;">欢迎来到聊天室，请先登录并加入房间</div>
  </div>
  <div class="input-area">
    <input type="text" id="msgInput" placeholder="输入消息..." disabled onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()" id="btnSend" disabled>发送</button>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu" style="display:none"></div>

<script>
const BASE = '';
let token = localStorage.getItem('token');
let user = null;
let roomId = 'room_default';
let lastMessageId = null;
let pollingTimer = null;
let onlineTimer = null;

// ---- Init ----
if (token) { resumeSession(); }

// ---- Toast ----
function toast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type || 'success');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ---- Modal ----
function showModal(title, content) {
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.id = 'modalOverlay';
  ov.innerHTML = '<div class="modal"><h2>' + title + '</h2>' + content + '</div>';
  document.body.appendChild(ov);
  ov.onclick = e => { if (e.target === ov) closeModal(); };
}

function closeModal() {
  const ov = document.getElementById('modalOverlay');
  if (ov) ov.remove();
}

// ---- Auth ----
function showLoginModal() {
  showModal('登录', `
    <div class="form-group"><label>用户名</label><input id="loginUser" placeholder="用户名"></div>
    <div class="form-group"><label>密码</label><input id="loginPass" type="password" placeholder="密码"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="doLogin()">登录</button>
      <button class="btn-ghost" onclick="closeModal()">取消</button>
    </div>
    <div class="switch-link">没有账号？<a onclick="closeModal();showRegisterModal()">立即注册</a></div>
  `);
}

function showRegisterModal() {
  showModal('注册', `
    <div class="form-group"><label>用户名</label><input id="regUser" placeholder="3-20位字符"></div>
    <div class="form-group"><label>密码</label><input id="regPass" type="password" placeholder="至少6位"></div>
    <div class="form-group"><label>昵称</label><input id="regNick" placeholder="显示名称（可选）"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="doRegister()">注册</button>
      <button class="btn-ghost" onclick="closeModal()">取消</button>
    </div>
    <div class="switch-link">已有账号？<a onclick="closeModal();showLoginModal()">去登录</a></div>
  `);
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const password = document.getElementById('regPass').value;
  const nickname = document.getElementById('regNick').value.trim();
  const res = await fetch(BASE + '/api/auth/register', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password, nickname })
  });
  const data = await res.json();
  if (data.code === 200) {
    setSession(data.data);
    closeModal();
    toast('注册成功!', 'success');
  } else {
    toast(data.message, 'error');
  }
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const res = await fetch(BASE + '/api/auth/login', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  if (data.code === 200) {
    setSession(data.data);
    closeModal();
    toast('登录成功!', 'success');
  } else {
    toast(data.message, 'error');
  }
}

function setSession(data) {
  token = data.token;
  user = { userId: data.userId, username: data.username, role: data.role };
  localStorage.setItem('token', token);
  updateUI();
  joinRoom();
}

async function resumeSession() {
  try {
    const res = await fetch(BASE + '/api/rooms/history?roomId=' + roomId, {
      headers: { 'X-Auth-Token': token }
    });
    const data = await res.json();
    if (data.code !== 200) { logout(); return; }
    user = { role: 'user' };
    updateUI();
    joinRoom();
    fetchOnlineUsers();
  } catch { logout(); }
}

function logout() {
  if (token) {
    fetch(BASE + '/api/auth/logout', {
      method: 'POST', headers: { 'X-Auth-Token': token }
    }).catch(() => {});
  }
  token = null; user = null; lastMessageId = null;
  localStorage.removeItem('token');
  clearInterval(pollingTimer);
  clearInterval(onlineTimer);
  updateUI();
  document.getElementById('messages').innerHTML =
    '<div style="text-align:center;color:#555;margin-top:40%;">欢迎来到聊天室，请先登录并加入房间</div>';
  document.getElementById('onlineList').innerHTML = '';
  document.getElementById('onlineCount').textContent = '0';
}

// ---- Profile ----
function showProfileModal() {
  showModal('修改资料', `
    <div class="form-group"><label>新昵称</label><input id="profNick" placeholder="留空不修改"></div>
    <div class="form-group"><label>新密码</label><input id="profPass" type="password" placeholder="留空不修改"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="doUpdateProfile()">保存</button>
      <button class="btn-ghost" onclick="closeModal()">取消</button>
    </div>
  `);
}

async function doUpdateProfile() {
  const nickname = document.getElementById('profNick').value.trim();
  const password = document.getElementById('profPass').value;
  const res = await fetch(BASE + '/api/user/profile/update', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Auth-Token': token },
    body: JSON.stringify({ nickname: nickname || null, password: password || null })
  });
  const data = await res.json();
  if (data.code === 200) {
    closeModal();
    toast('资料已更新', 'success');
  } else {
    toast(data.message, 'error');
  }
}

// ---- Room ----
async function joinRoom() {
  const res = await fetch(BASE + '/api/rooms/join', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Auth-Token': token },
    body: JSON.stringify({ roomId })
  });
  const data = await res.json();
  if (data.code === 200) {
    startPolling();
    fetchOnlineUsers();
    fetchHistory();
    onlineTimer = setInterval(fetchOnlineUsers, 5000);
    toast('已加入聊天室', 'success');
  } else {
    toast(data.message, 'error');
  }
}

async function leaveRoom() {
  await fetch(BASE + '/api/rooms/exit', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Auth-Token': token },
    body: JSON.stringify({ roomId })
  });
  clearInterval(pollingTimer);
  clearInterval(onlineTimer);
  toast('已退出聊天室');
}

// ---- Messages ----
async function sendMsg() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  const res = await fetch(BASE + '/api/messages/send', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Auth-Token': token },
    body: JSON.stringify({ roomId, content })
  });
  const data = await res.json();
  if (data.code === 200) {
    lastMessageId = data.data.messageId;
    pollMessages();
  } else {
    toast(data.message, 'error');
  }
}

async function pollMessages() {
  let url = BASE + '/api/messages/poll?roomId=' + roomId;
  if (lastMessageId) url += '&lastMessageId=' + encodeURIComponent(lastMessageId);
  try {
    const res = await fetch(url, { headers: { 'X-Auth-Token': token } });
    const data = await res.json();
    if (data.code === 200 && data.data && data.data.length > 0) {
      const container = document.getElementById('messages');
      if (container.querySelector('div[style]')) container.innerHTML = '';
      data.data.forEach(msg => {
        appendMessage(msg, container);
        if (!lastMessageId || msg.messageId > lastMessageId) {
          lastMessageId = msg.messageId;
        }
      });
      container.scrollTop = container.scrollHeight;
    }
  } catch {}
}

function appendMessage(msg, container) {
  const existing = document.getElementById('msg-' + msg.messageId);
  if (existing) return;
  const isOwn = user && user.userId === msg.senderId;
  const isAdmin = msg.senderName === 'admin' || false; // simplified
  const div = document.createElement('div');
  div.id = 'msg-' + msg.messageId;
  div.className = 'msg' + (isOwn ? ' own' : '') + (msg.deleted ? ' deleted' : '');
  const initial = (msg.senderName || '?')[0].toUpperCase();
  div.innerHTML =
    '<div class="avatar ' + (isAdmin ? 'admin-av' : 'user-av') + '">' + initial + '</div>' +
    '<div class="bubble">' +
      '<div class="sender">' + escapeHtml(msg.senderName) + '</div>' +
      '<div>' + (msg.deleted ? '[该消息已被管理员删除]' : escapeHtml(msg.content)) + '</div>' +
      '<div class="meta">' + (msg.sendTime || '') + '</div>' +
    '</div>';
  div.oncontextmenu = e => showContextMenu(e, msg);
  container.appendChild(div);
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function fetchHistory() {
  const res = await fetch(BASE + '/api/rooms/history?roomId=' + roomId, {
    headers: { 'X-Auth-Token': token }
  });
  const data = await res.json();
  if (data.code === 200 && data.data) {
    const container = document.getElementById('messages');
    container.innerHTML = '';
    data.data.forEach(msg => {
      appendMessage(msg, container);
      if (!lastMessageId || msg.messageId > lastMessageId) {
        lastMessageId = msg.messageId;
      }
    });
    container.scrollTop = container.scrollHeight;
  }
}

function startPolling() {
  clearInterval(pollingTimer);
  pollingTimer = setInterval(pollMessages, 1000);
}

// ---- Online users ----
async function fetchOnlineUsers() {
  const res = await fetch(BASE + '/api/rooms/online-users?roomId=' + roomId, {
    headers: { 'X-Auth-Token': token }
  });
  const data = await res.json();
  if (data.code === 200 && data.data) {
    renderOnlineUsers(data.data);
  }
}

function renderOnlineUsers(users) {
  document.getElementById('onlineCount').textContent = users.length;
  const list = document.getElementById('onlineList');
  list.innerHTML = users.map(u =>
    '<div class="online-user">' +
      '<span class="dot"></span>' +
      '<span>' + escapeHtml(u.nickname || u.username) + '</span>' +
      (u.role === 'admin' ? '<span class="admin-badge">ADMIN</span>' : '') +
    '</div>'
  ).join('');
}

// ---- Context Menu (admin) ----
function showContextMenu(e, msg) {
  e.preventDefault();
  const menu = document.getElementById('ctxMenu');
  if (!user || user.role !== 'admin') { menu.style.display = 'none'; return; }
  menu.innerHTML =
    '<button onclick="adminDeleteMsg(\'' + msg.messageId + '\')" class="danger">删除此消息</button>' +
    '<button onclick="adminMuteUser(\'' + msg.senderId + '\',\'' + escapeHtml(msg.senderName) + '\')">禁言此用户</button>' +
    '<button onclick="adminKickUser(\'' + msg.senderId + '\',\'' + escapeHtml(msg.senderName) + '\')" class="danger">踢出此用户</button>';
  menu.style.display = 'block';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  setTimeout(() => document.addEventListener('click', hideCtxMenu, { once: true }), 0);
}

function hideCtxMenu() {
  document.getElementById('ctxMenu').style.display = 'none';
}

async function adminDeleteMsg(messageId) {
  if (!confirm('确定删除此消息？')) return;
  const res = await fetch(BASE + '/api/admin/messages/delete', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Auth-Token': token },
    body: JSON.stringify({ roomId, messageId })
  });
  const data = await res.json();
  if (data.code === 200) {
    fetchHistory();
    toast('消息已删除', 'success');
  } else {
    toast(data.message, 'error');
  }
}

async function adminMuteUser(userId, name) {
  const mins = prompt('禁言 ' + name + ' 多少分钟？', '5');
  if (!mins) return;
  const res = await fetch(BASE + '/api/admin/mute', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Auth-Token': token },
    body: JSON.stringify({ roomId, userId, durationMinutes: parseInt(mins) })
  });
  const data = await res.json();
  toast(data.code === 200 ? name + ' 已被禁言 ' + mins + ' 分钟' : data.message,
    data.code === 200 ? 'success' : 'error');
}

async function adminKickUser(userId, name) {
  if (!confirm('确定踢出 ' + name + '？')) return;
  const res = await fetch(BASE + '/api/admin/kick', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Auth-Token': token },
    body: JSON.stringify({ roomId, userId })
  });
  const data = await res.json();
  if (data.code === 200) {
    fetchOnlineUsers();
    toast(name + ' 已被踢出', 'success');
  } else {
    toast(data.message, 'error');
  }
}

// ---- UI state ----
function updateUI() {
  const loggedIn = !!token;
  document.getElementById('btnLogin').style.display = loggedIn ? 'none' : '';
  document.getElementById('btnJoin').style.display = loggedIn ? '' : 'none';
  document.getElementById('userPanel').style.display = loggedIn ? '' : 'none';
  document.getElementById('msgInput').disabled = !loggedIn;
  document.getElementById('btnSend').disabled = !loggedIn;
  document.getElementById('connStatus').textContent = loggedIn ? '已连接' : '未连接';
  document.getElementById('connStatus').className = 'conn-status ' + (loggedIn ? 'connected' : 'disconnected');
  if (loggedIn) {
    document.getElementById('roomName').textContent = '公共聊天室';
    document.getElementById('roomStatus').textContent = 'default room';
  }
}
updateUI();
</script>
</body>
</html>
